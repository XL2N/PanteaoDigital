<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MITOS 🏛️</title>

    <!-- PRECONEXÕES GOOGLE FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- FONTES -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">

    <!-- ESTILOS -->
    <link rel="stylesheet" href="../css/geral.css">
    <link rel="stylesheet" href="../css/mitos.css">

    <!-- SCRIPT -->
    <script src="../js/mitos.js" defer></script>
</head>

<body>
    <!-- CABEÇALHO E BARRA DE NAVEGAÇÃO -->
    <div class="header-wrapper">
        <header>
            <h1>O Panteão Digital 🏛️</h1>
            <nav>
                <ul>
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="herois.html">Heróis</a></li>
                    <li><a href="mitos.html" class="active">Mitos</a></li>
                </ul>
            </nav>
        </header>
    </div>

    <main>
        <h2>🏛️ Grandes Mitos 🏛️</h2>

        <div class="mitos-container">
            <!-- BARRA LATERAL DE MITOS -->
            <section class="lista-mitos">
                <ul>
                    <li><button class="btn-mito" data-mito="pandora">A Caixa de Pandora</button></li>
                    <li><button class="btn-mito" data-mito="odisseu">A jornada de Odisseu</button></li>
                    <li><button class="btn-mito" data-mito="perseu">Perseu e Medusa</button></li>
                    <li><button class="btn-mito" data-mito="hercules">As doze tarefas de Hércules</button></li>
                    <li><button class="btn-mito" data-mito="teseu">Teseu e o Minotauro</button></li>
                    <li><button class="btn-mito" data-mito="sisifo">Sísifo</button></li>
                    <li><button class="btn-mito" data-mito="persefone">O rapto de Perséfone</button></li>
                    <li><button class="btn-mito" data-mito="eros">Eros e Psiquê</button></li>
                    <li><button class="btn-mito" data-mito="icaro">Dédalo e Ícaro</button></li>
                    <li><button class="btn-mito" data-mito="midas">Rei Midas</button></li>
                </ul>
            </section>

            <section class="conteudo-mito">
                <div id="mito-display-inicial">
                    <img src="../images/mitos/oraculo.png" alt="Oráculo de Delfos" class="mito-imagem-inicial">
                    <h3>Selecione um mito ao lado</h3>
                    <p>Clique em um dos títulos para carregar a história e a imagem correspondente.</p>
                </div>

                <div id="mito-display-conteudo" style="display: none;">
                    <h3 id="mito-titulo"></h3>
                    <img id="mito-imagem" src="" alt="Imagem do Mito">
                    <p id="mito-texto"></p>
                    <a id="mito-referencia" href="#" target="_blank" class="referencia-link"></a>
                </div>
            </section>
        </div>

    </main>

    <footer>
        <p>Feito por Giselle Novaes| Projeto para o Curso Fic DJANGO</p>
    </footer>

</body>

</html>
